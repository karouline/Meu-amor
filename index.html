<!DOCTYPE html>  <html lang="pt-br">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Área Secreta 💖</title>  <style>  
body {  
  margin: 0;  
  font-family: Arial, sans-serif;  
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);  
  display: flex;  
  justify-content: center;  
  align-items: center;  
  min-height: 100vh;  
  padding: 40px 0;  
  text-align: center;  
  color: white;  
  overflow-y: auto;  
}  
  
.container {  
  background: rgba(255, 255, 255, 0.15);  
  padding: 30px;  
  border-radius: 20px;  
  backdrop-filter: blur(10px);  
  width: 90%;  
  max-width: 400px;  
}  
  
input {  
  padding: 10px;  
  border-radius: 10px;  
  border: none;  
  width: 100%;  
  margin-bottom: 15px;  
}  
  
button {  
  padding: 10px 20px;  
  border: none;  
  border-radius: 20px;  
  background-color: white;  
  color: #ff1493;  
  font-weight: bold;  
  cursor: pointer;  
  margin: 5px;  
  transition: all 0.3s ease;  
}  

  button {
  position: relative;
  overflow: hidden;
}

button::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: 0.5s;
}

button:hover::after {
  left: 100%;
}
  
button:hover {  
  transform: scale(1.05);  
}  
  
.hidden {  
  display: none;  
}  
  
#carta {  
  background: rgba(255,255,255,0.2);  
  padding: 20px;  
  border-radius: 15px;  
  margin-top: 20px;  
  text-align: left;  
  line-height: 1.6;  
}  
  
/* ===== EFEITO GELATINA ===== */  
@keyframes gelatina {  
  0%   { transform: scale(1); }  
  25%  { transform: scale(1.2, 0.8); }  
  50%  { transform: scale(0.8, 1.2); }  
  75%  { transform: scale(1.1, 0.9); }  
  100% { transform: scale(1); }  
}  
  
.gelatina {  
  animation: gelatina 0.5s ease;  
}  

  .fundo-coracao {
  position: fixed;
  top: -10px;
  font-size: 14px;
  opacity: 0.2;
  animation: cair linear infinite;
}

@keyframes cair {
  from {
    transform: translateY(-10px);
  }
  to {
    transform: translateY(110vh);
  }
}
  
/* ===== CORAÇÕES SUBINDO ===== */  
.coracao {
  position: fixed;
  bottom: -20px;
  pointer-events: none;
  animation: flutuar ease-out forwards;
}

@keyframes flutuar {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
    opacity: 1;
  }

  50% {
    transform: translateY(-40vh) translateX(20px) rotate(15deg);
  }

  100% {
    transform: translateY(-100vh) translateX(-20px) rotate(-15deg);
    opacity: 0;
  }
}
  
</style>  </head>  <body>  <div class="container" id="login">  
  <h2>Digite nossa senha 💌</h2>  
  <input type="password" id="password" placeholder="Nossa senha...">  
  <button onclick="checkPassword()">Entrar</button>  
</div>  <div class="container hidden" id="content">  
  <h1>Feliz aniversário, meu amor 🎂💖</h1>  
  <p>Você é o amor da minha vida.</p>  
<button onclick="showMessage()">Nossa História</button>
<button onclick="abrirFotos()">Nossa trajetória 💕</button>

  <p id="extra" style="margin-top:15px;"></p>  <button id="btnCarta" onclick="mostrarCarta()">Ler minha carta 💌</button>

  <div id="carta" class="hidden"></div>    <audio id="music" loop>  
    <source src="musica.mp3" type="audio/mpeg">  
  </audio>  
  </div> <!-- fecha content -->
  <div class="container hidden" id="boasVindas">
  <h2>Você voltou, meu amor 💕</h2>
  <p>Eu sabia que você não resistiria a mim muehuehue 😼</p>
  <button onclick="entrarDireto()">Entrar 💖</button>
  </div>

  <div class="container hidden" id="perguntaAmor">
  <h2>Você me ama mesmo??</h2>

  <button id="btnSim" onclick="clicouSim()">Sim 💕</button>
  <button id="btnNao" onmousemove="fugirNao()">Não 😡</button>
  </div>

<div class="container hidden" id="paginaFotos">
  <h1>Nós dois 💕</h1>

  <img src="foto1.jpg" style="width:100%; border-radius:20px; margin-bottom:15px;">
  <img src="foto2.jpg" style="width:100%; border-radius:20px; margin-bottom:15px;">

  <button onclick="voltarPrincipal()">Voltar 💌</button>
</div> 
  <script>  
    
  window.onload = function() {
  if (localStorage.getItem("logado") === "sim") {
    document.getElementById("login").classList.add("hidden");

    if (!localStorage.getItem("jaRespondeu")) {
      document.getElementById("perguntaAmor").classList.remove("hidden");
    } else {
      document.getElementById("boasVindas").classList.remove("hidden");
    }
  }
  }
    
const correctPassword = "idchlitalaiwyigasomf";  
  
function checkPassword() {
  const input = document.getElementById("password").value;
  const music = document.getElementById("music");

  if (input === correctPassword) {
    localStorage.setItem("logado", "sim");

    document.getElementById("login").classList.add("hidden");
  
  if (!localStorage.getItem("jaRespondeu")) {
  document.getElementById("perguntaAmor").classList.remove("hidden");
} else {
  document.getElementById("content").classList.remove("hidden");
  music.play();
    }
    
  } else {
    alert("Senha incorreta 😠");
  }
}

function criarFundoMagico() {
  setInterval(() => {
    const c = document.createElement("div");
    c.innerHTML = "💗";
    c.classList.add("fundo-coracao");

    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.animationDuration = 5 + Math.random() * 5 + "s";

    document.body.appendChild(c);

    setTimeout(() => c.remove(), 10000);
  }, 800);
}

criarFundoMagico();
  
function showMessage() {  
  const extra = document.getElementById("extra");  
  extra.innerText = extra.innerText !== ""   
    ? ""   
    : "Desde o dia que te conheci, minha vida ficou mais feliz. Cada momento com você é especial.";  
}  
  
function showReasons() {  
  const extra = document.getElementById("extra");  
  extra.innerText = extra.innerText !== ""   
    ? ""   
    : "Eu te amo pelo seu sorriso, pelo seu carinho, pelo seu jeito único e por ser exatamente quem você é.";  
}  
  
/* ===== CARTA COM GELATINA + CORAÇÕES ===== */  
function mostrarCarta() {  
  const carta = document.getElementById("carta");  
  const botao = document.getElementById("btnCarta");  
  
  botao.classList.add("gelatina");  
  setTimeout(() => botao.classList.remove("gelatina"), 500);  
  
  if (!carta.classList.contains("hidden")) {  
    carta.classList.add("hidden");  
    carta.innerHTML = "";  
  } else {  
    carta.classList.remove("hidden");  
    carta.innerHTML = `  
      <h2>Minha carta para você 💖</h2>  
      <p>Oi meu amor! Pensei em fazer algo mais especial nesse ano, pois é finalmente o ano que poderemos ficar juntos. As coisas até aqui foram muito caóticas, e ter você na minha vida adicionou um pouco mais de drama e de amor pra todas as minhas histórias. Eu não canso de te dizer que eu te amo, apesar de você se cansar de ouvir hihi 💕  
Continuo perdidinha de amores pelo menininho inocente que não sabia que iria acabar namorando com uma porca selvagem toda estranhinha da sala dele hihi   
A cada dia você me enche de mais e mais orgulho, sou grata por poder acompanhar a sua evolução, pois você é um homem maravilhoso. Se Deus quiser será pai dos meus filhos, e eu vou orar MUITO por isso kkkkk tanto quanto eu orei para você me amar (e minha reza braba funciona hein?? Quem tem fé tem tudoo!!)   
Você me ajudou em um momento que eu não tinha nem a mim mesma, e fez coisas por mim que ninguém nunca jamais fez. Quero poder retribuir todo o carinho que você me deu nestes últimos três anos pelo resto da vida que compartilharemos lado a lado e pela eternidade que minha alma ficará enchendo o saco da sua kkkkkkk  
Você é o menino que fez eu me sentir acolhida em todas as calls, em todas as vezes que você se lembrou de mim nas pequenas e grandes coisas, em todos os reels que você me mandou de madrugada porque viu um vídeo e pensou em mim...  
Você é o motivo da minha vitória todos os dias, pois eu me inspiro em você! Sempre foi mais inteligente que eu, mais atlético que eu, mais ativo que eu em tudo! E isso sempre fez eu querer inconscientemente evoluir em todas essas coisas para não ficar para trás. Quero te acompanhar pelo resto da vida, meu amor. Essa é a jornada que eu escolherei todos os dias em que eu te tiver, mesmo apesar das briguinhas bestas e frequentes que temos.</p>  
      <p>Eu amo você.</p>  
    `;  
    soltarCoracoes();  
  }  
}  
  
function soltarCoracoes() {
  for (let i = 0; i < 20; i++) {
    const coracao = document.createElement("div");

    coracao.innerHTML = "💞";
    coracao.classList.add("coracao");

    const tamanho = 15 + Math.random() * 30;
    const duracao = 3 + Math.random() * 3;
    const posicao = Math.random() * window.innerWidth;

    coracao.style.left = posicao + "px";
    coracao.style.fontSize = tamanho + "px";
    coracao.style.animationDuration = duracao + "s";

    document.body.appendChild(coracao);

    setTimeout(() => coracao.remove(), duracao * 1000);
  }
}

  function abrirFotos() {
  document.getElementById("content").classList.add("hidden");
  document.getElementById("paginaFotos").classList.remove("hidden");
}

function voltarPrincipal() {
  document.getElementById("paginaFotos").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");
}
    
 function iniciarSite() {  
  document.getElementById("startScreen").style.display = "none";  
  document.getElementById("music").play();  
}  
 
function entrarDireto() {
  document.getElementById("boasVindas").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");

  const music = document.getElementById("music");
  music.currentTime = 0;
  music.play();
}

function fugirNao() {
  const botao = document.getElementById("btnNao");

  const larguraBotao = botao.offsetWidth;
  const alturaBotao = botao.offsetHeight;

  const larguraTela = window.innerWidth;
  const alturaTela = window.innerHeight;

  const novaPosX = Math.random() * (larguraTela - larguraBotao);
  const novaPosY = Math.random() * (alturaTela - alturaBotao);

  botao.style.position = "fixed";
  botao.style.left = novaPosX + "px";
  botao.style.top = novaPosY + "px";
}


  let etapa = 0;

function clicouSim() {
  const btn = document.getElementById("btnSim");

  if (etapa === 0) {
    btn.innerText = "Você tem certeza?";
  } else if (etapa === 1) {
    btn.innerText = "Mas assim... Você tem certeza mesmo mesmo?";
  } else if (etapa === 2) {
    btn.innerText = "Tá… você me ama hihi 💕";

    setTimeout(() => {
      localStorage.setItem("jaRespondeu", "sim");

      document.getElementById("perguntaAmor").classList.add("hidden");
      document.getElementById("content").classList.remove("hidden");

      document.getElementById("music").play();
    }, 1000);

    return;
  }

  etapa++;
}

document.querySelectorAll("button").forEach(botao => {
  botao.addEventListener("click", function () {
    botao.classList.add("gelatina");

    setTimeout(() => {
      botao.classList.remove("gelatina");
    }, 500);
  });
});
    
</script>  </body>  
</html>
