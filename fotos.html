<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossas Fotos 💕</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  padding: 30px;
  color: #fff;
}

h1 {
  margin-bottom: 30px;
}

.galeria {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.galeria img {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

button {
  margin-top: 30px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background-color: white;
  color: #ff1493;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Nós dois 💘</h1>

<div class="galeria">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<button onclick="window.location.href='index.html'">
Voltar 💌
</button>

</body>
</html>
