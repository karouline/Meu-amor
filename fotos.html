<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nós dois 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  padding: 20px;
  color: white;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

h1 {
  margin-bottom: 20px;
}

/* ===== GALERIA EM GRADE ===== */
.galeria {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.galeria img {
  width: 100%;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.3s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.galeria img:hover {
  transform: scale(1.05);
}

/* ===== FOTO EM TELA CHEIA ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay img {
  width: 90%;
  border-radius: 20px;
}

button {
  margin-top: 25px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background-color: white;
  color: #ff1493;
  font-weight: bold;
  cursor: pointer;
}

/* ===== CORAÇÕES ===== */
.coracao {
  position: fixed;
  bottom: 0;
  font-size: 20px;
  animation: subir 3s linear forwards;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Nós dois 💕</h1>

<div class="galeria">
  <img src="foto1.jpg" onclick="abrirFoto(this)">
  <img src="foto2.jpg" onclick="abrirFoto(this)">
  <img src="foto3.jpg" onclick="abrirFoto(this)">
  <img src="foto4.jpg" onclick="abrirFoto(this)">
</div>

<button onclick="window.location.href='index.html'">
Voltar 💌
</button>

<script>

/* ===== ABRIR FOTO GRANDE ===== */
function abrirFoto(img) {
  const overlay = document.createElement("div");
  overlay.classList.add("overlay");

  overlay.innerHTML = `<img src="${img.src}">
